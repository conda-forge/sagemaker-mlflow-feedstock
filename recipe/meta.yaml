{% set name = "sagemaker-mlflow" %}
{% set version = "0.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sagemaker_mlflow-{{ version }}.tar.gz
  sha256: f1657bd1351c7312450b2642782298b8f40c2842fabc45649b9f2f15f7b4456e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - boto3 >=1.34
    - mlflow >=2.8

test:
  imports:
    - sagemaker_mlflow
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/aws/sagemaker-mlflow
  summary: AWS Plugin for MLFlow with SageMaker
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE

extra:
  recipe-maintainers:
    - claytonparnell
    - saimidu
